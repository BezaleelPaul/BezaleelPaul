<svg viewBox="0 0 800 260" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cp-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#070a0e;stop-opacity:1" />
    </linearGradient>
    <filter id="neon-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="needle-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <style>
      .bg-card {
        fill: url(#cp-grad);
        stroke: #39ff14;
        stroke-width: 1.5;
        stroke-opacity: 0.3;
        rx: 10px;
      }
      .stat-panel {
        stroke: #30363d;
        stroke-width: 1;
        fill: none;
        rx: 8px;
      }
      .sec-title {
        font-family: 'JetBrains Mono', 'Fira Code', monospace;
        font-size: 14px;
        fill: #39ff14;
        font-weight: bold;
        letter-spacing: 2px;
      }
      .cf-handle {
        font-family: 'JetBrains Mono', monospace;
        font-size: 18px;
        fill: #c9d1d9;
        font-weight: bold;
      }
      .stat-label {
        font-family: 'JetBrains Mono', monospace;
        font-size: 11px;
        fill: #8b949e;
        letter-spacing: 1px;
      }
      .stat-val-rating {
        font-family: 'JetBrains Mono', monospace;
        font-size: 26px;
        font-weight: 800;
        fill: #8b949e;
        filter: drop-shadow(0 0 4px #8b949e55);
      }
      .stat-val-rank {
        font-family: 'JetBrains Mono', monospace;
        font-size: 16px;
        font-weight: bold;
        fill: #8b949e;
      }
      .stat-val-max {
        font-family: 'JetBrains Mono', monospace;
        font-size: 13px;
        fill: #c9d1d9;
      }
      .max-highlight {
        color: #8b949e;
        font-weight: bold;
        fill: #8b949e;
      }
      .dial-bg {
        stroke: #161b22;
        stroke-width: 8;
        fill: none;
        stroke-linecap: round;
      }
      .dial-fill {
        stroke: #39ff14;
        stroke-width: 8;
        fill: none;
        stroke-linecap: round;
        filter: url(#neon-glow);
        stroke-dasharray: 400;
        stroke-dashoffset: 400;
      }
      .needle {
        stroke: #ff3333;
        stroke-width: 3;
        stroke-linecap: round;
        filter: url(#needle-glow);
      }
      .needle-cap {
        fill: #ff3333;
        stroke: #0d1117;
        stroke-width: 2;
      }
      .dial-label {
        font-family: 'JetBrains Mono', monospace;
        font-size: 10px;
        fill: #8b949e;
        text-anchor: middle;
      }
      .dial-center-val {
        font-family: 'JetBrains Mono', monospace;
        font-size: 22px;
        font-weight: bold;
        fill: #c9d1d9;
        text-anchor: middle;
      }
    </style>
  </defs>

  <!-- Background card -->
  <rect x="2" y="2" width="796" height="256" class="bg-card" />

  <!-- Left Stats Panel -->
  <rect x="20" y="20" width="400" height="220" class="stat-panel" />
  <text x="35" y="45" class="sec-title">// COMPETITIVE PROGRAMMING</text>
  
  <text x="35" y="80" class="cf-handle">BezaleelPaulN</text>
  
  <!-- Current Rating / Rank -->
  <text x="35" y="115" class="stat-label">CODEFORCES RATING</text>
  <text x="35" y="145" class="stat-val-rating">959</text>
  <text x="120" y="142" class="stat-val-rank">[NEWBIE]</text>
  
  <!-- Max Rating -->
  <text x="35" y="180" class="stat-label">MAX RATING RECORD</text>
  <text x="35" y="205" class="stat-val-max">959 <tspan class="max-highlight">[NEWBIE]</tspan></text>
  
  <!-- Small hint -->
  <text x="35" y="225" class="stat-label" font-size="9" fill="#58a6ff">Updates automatically every 6 hours</text>

  <!-- Right Gauge Panel -->
  <rect x="440" y="20" width="340" height="220" class="stat-panel" />
  <text x="455" y="45" class="sec-title">// RATING GAUGE</text>
  
  <!-- Gauge Arc Background -->
  <path d="M 487.7,187.5 A 95,95 0 1 1 652.3,187.5" class="dial-bg" />
  
  <!-- Gauge Arc Fill (Animated using SVG SMIL) -->
  <path d="M 487.7,187.5 A 95,95 0 1 1 652.3,187.5" class="dial-fill">
    <!-- Animated fill arc based on rating percentage (max 3000 rating = 400 stroke-dashoffset) -->
    <animate attributeName="stroke-dashoffset" from="400" to="273" dur="1.5s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.4 0 0.2 1"/>
  </path>
  
  <!-- Ticks or labels on the dial -->
  <text x="480" y="202" class="dial-label">0</text>
  <text x="570" y="38" class="dial-label">1500</text>
  <text x="660" y="202" class="dial-label">3000</text>
  
  <!-- Rating display inside dial -->
  <text x="570" y="175" class="dial-center-val">959</text>
  <text x="570" y="190" class="dial-label" font-size="8">CF RATING</text>
  
  <!-- Needle -->
  <g>
    <!-- Rotate needle from -120 to target angle (default pointing straight up, which is 0 degrees) -->
    <!-- The transform origin is the center of rotation (cx, cy) = (570, 140) -->
    <line x1="570" y1="140" x2="570" y2="60" class="needle">
      <animateTransform attributeName="transform" type="rotate" from="-120 570 140" to="-43.28 570 140" dur="1.5s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.4 0 0.2 1"/>
    </line>
    <circle cx="570" cy="140" r="8" class="needle-cap" />
    <circle cx="570" cy="140" r="3" fill="#0d1117" />
  </g>
</svg>
