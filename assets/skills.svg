<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="card-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#070a0e;stop-opacity:1" />
    </linearGradient>
    <filter id="neon-glow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <style>
      .bg-rect {
        fill: url(#card-grad);
        stroke: #39ff14;
        stroke-width: 1.5;
        stroke-opacity: 0.3;
        rx: 10px;
      }
      .group-title {
        font-family: 'JetBrains Mono', 'Fira Code', monospace;
        font-size: 14px;
        fill: #39ff14;
        font-weight: bold;
        letter-spacing: 2px;
      }
      .skill-label {
        font-family: 'JetBrains Mono', 'Fira Code', monospace;
        font-size: 13px;
        fill: #c9d1d9;
      }
      .skill-percent {
        font-family: 'JetBrains Mono', 'Fira Code', monospace;
        font-size: 12px;
        fill: #39ff14;
        font-weight: bold;
      }
      .bar-bg {
        fill: #161b22;
        rx: 3px;
      }
      .bar-fill {
        fill: #39ff14;
        filter: url(#neon-glow);
        rx: 3px;
      }
      .panel-border {
        stroke: #30363d;
        stroke-width: 1;
        fill: none;
        rx: 8px;
      }
    </style>
  </defs>

  <!-- Outer container -->
  <rect x="2" y="2" width="796" height="396" class="bg-rect" />

  <!-- Subdecorative grid pattern -->
  <path d="M 400,10 L 400,390 M 10,200 L 790,200" stroke="#30363d" stroke-opacity="0.5" stroke-dasharray="4 4" stroke-width="1"/>
  <!-- Card for LANGUAGES -->
  <rect x="20" y="20" width="370" height="170" class="panel-border" />
  <text x="35" y="45" class="group-title">// LANGUAGES</text>
  <text x="35" y="80" class="skill-label">Python</text>
  <rect x="130" y="70" width="220" height="10" class="bar-bg"/>
  <rect x="130" y="70" width="0" height="10" class="bar-fill">
    <animate attributeName="width" from="0" to="198" dur="1.2s" begin="0.0s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.4 0 0.2 1"/>
  </rect>
  <text x="360" y="80" class="skill-percent">90%</text>
  <text x="35" y="108" class="skill-label">JavaScript</text>
  <rect x="130" y="98" width="220" height="10" class="bar-bg"/>
