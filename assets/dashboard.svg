  <line x1="30" y1="46" x2="322" y2="46" stroke="#30363d" stroke-width="0.5" />

  <text x="30" y="70" class="metric-title">TOTAL CONTRIBUTIONS (30D)</text>
  <text x="30" y="96" class="metric-value metric-highlight">5</text>

