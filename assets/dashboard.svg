    <rect x="468" y="230" width="12" height="12" fill="#161b22" opacity="1" rx="2"/>
    <rect x="484" y="230" width="12" height="12" fill="#161b22" opacity="1" rx="2"/>
    <rect x="500" y="230" width="12" height="12" fill="#161b22" opacity="1" rx="2"/>
    <rect x="516" y="230" width="12" height="12" fill="#161b22" opacity="1" rx="2"/>
    <rect x="532" y="230" width="12" height="12" fill="#161b22" opacity="1" rx="2"/>
    <rect x="548" y="230" width="12" height="12" fill="#161b22" opacity="1" rx="2"/>
    <rect x="564" y="230" width="12" height="12" fill="#161b22" opacity="1" rx="2"/>
    <rect x="580" y="230" width="12" height="12" fill="#39ff14" opacity="1" rx="2"/>
    <rect x="596" y="230" width="12" height="12" fill="#161b22" opacity="1" rx="2"/>
    <rect x="612" y="230" width="12" height="12" fill="#161b22" opacity="1" rx="2"/>
    <rect x="628" y="230" width="12" height="12" fill="#161b22" opacity="1" rx="2"/>
    <rect x="644" y="230" width="12" height="12" fill="#161b22" opacity="1" rx="2"/>
    <rect x="660" y="230" width="12" height="12" fill="#161b22" opacity="1" rx="2"/>
    <rect x="676" y="230" width="12" height="12" fill="#161b22" opacity="1" rx="2"/>
    <rect x="692" y="230" width="12" height="12" fill="#161b22" opacity="1" rx="2"/>
    <rect x="708" y="230" width="12" height="12" fill="#00a300" opacity="0.9" rx="2"/>
    <rect x="724" y="230" width="12" height="12" fill="#161b22" opacity="1" rx="2"/>
    <rect x="740" y="230" width="12" height="12" fill="#161b22" opacity="1" rx="2"/>
    <rect x="756" y="230" width="12" height="12" fill="#161b22" opacity="1" rx="2"/>
    <rect x="772" y="230" width="12" height="12" fill="#39ff14" opacity="1" rx="2"/>
    <rect x="788" y="230" width="12" height="12" fill="#00a300" opacity="0.9" rx="2"/>
    <rect x="804" y="230" width="12" height="12" fill="#161b22" opacity="1" rx="2"/>
</svg>
