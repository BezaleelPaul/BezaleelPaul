<svg viewBox="0 0 800 260" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="conn-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#070a0e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="scan-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#39ff14;stop-opacity:0" />
      <stop offset="50%" style="stop-color:#39ff14;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#39ff14;stop-opacity:0" />
    </linearGradient>
    <filter id="neon-glow">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="soft-glow">
      <feGaussianBlur stdDeviation="1.5" result="blur" />
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .bg-card { fill: url(#conn-grad); stroke: #39ff14; stroke-width: 1.5; stroke-opacity: 0.25; rx: 10px; }
      .panel { stroke: #30363d; stroke-width: 1; fill: none; rx: 8px; }
      .sec-title { font-family: 'JetBrains Mono', 'Fira Code', monospace; font-size: 13px; fill: #39ff14; font-weight: bold; letter-spacing: 2px; }
      .holo-avatar { stroke: #39ff14; stroke-width: 1.5; stroke-dasharray: 4 4; fill: none; }
      .holo-grid { stroke: #39ff14; stroke-width: 0.5; stroke-opacity: 0.12; }
      .name-label { font-family: 'JetBrains Mono', monospace; font-size: 18px; font-weight: bold; fill: #39ff14; filter: drop-shadow(0 0 5px rgba(57, 255, 20, 0.4)); }
      .subtitle { font-family: 'JetBrains Mono', monospace; font-size: 11px; fill: #8b949e; letter-spacing: 1px; }
      .link-bg { fill: #161b22; stroke: #30363d; stroke-width: 1; rx: 6px; }
      .link-text { font-family: 'JetBrains Mono', monospace; font-size: 12px; fill: #c9d1d9; font-weight: bold; }
      .scan-line { stroke: #39ff14; stroke-width: 1.5; stroke-opacity: 0.6; filter: url(#neon-glow); }
      .hologram-beam { fill: url(#scan-grad); }
      .orbit-ring { fill: none; stroke: #39ff14; stroke-opacity: 0.15; }
    </style>
  </defs>

  <rect x="2" y="2" width="796" height="256" class="bg-card" />

  <rect x="16" y="16" width="360" height="228" class="panel" />
  <text x="30" y="38" class="sec-title">// HOLOGRAM IDENTITY</text>
  <line x1="30" y1="46" x2="362" y2="46" stroke="#30363d" stroke-width="0.5" />

  <g class="holo-grid">
    <path d="M 30,65 L 360,65 M 30,105 L 360,105 M 30,145 L 360,145 M 30,185 L 360,185 M 30,225 L 360,225" />
    <path d="M 80,55 L 80,235 M 140,55 L 140,235 M 200,55 L 200,235 M 270,55 L 270,235" />
  </g>

  <g transform="translate(50, 75)">
    <circle cx="55" cy="35" r="22" class="holo-avatar" />
    <path d="M 15,90 Q 55,55 95,90" class="holo-avatar" />

    <ellipse cx="55" cy="55" rx="50" ry="8" class="orbit-ring" stroke-dasharray="4 6">
      <animateTransform attributeName="transform" type="rotate" from="0 55 55" to="360 55 55" dur="6s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="55" cy="55" rx="60" ry="3" class="orbit-ring" stroke-dasharray="2 8">
      <animateTransform attributeName="transform" type="rotate" from="360 55 55" to="0 55 55" dur="8s" repeatCount="indefinite"/>
    </ellipse>

    <circle cx="55" cy="55" r="40" stroke="#39ff14" stroke-opacity="0.08" stroke-width="1" fill="none" />
    <circle cx="55" cy="55" r="30" stroke="#39ff14" stroke-opacity="0.12" stroke-width="1" fill="none" stroke-dasharray="6 4" />
  </g>

  <text x="220" y="105" class="name-label">BEZALEEL P.</text>
  <text x="220" y="125" class="subtitle">IDENTITY: CONFIRMED</text>
  <text x="220" y="145" class="subtitle">ROLE: FULL-STACK / AI</text>
  <text x="220" y="165" class="subtitle">LOC: BANGALORE, IN</text>
  <text x="220" y="185" class="subtitle">STATUS: BUILDING</text>

  <rect x="352" y="16" width="432" height="228" class="panel" />
  <text x="366" y="38" class="sec-title">// CONNECT CHANNELS</text>
  <line x1="366" y1="46" x2="770" y2="46" stroke="#30363d" stroke-width="0.5" />

  <g transform="translate(376, 70)">
    <rect x="0" y="0" width="180" height="42" class="link-bg" />
    <rect x="14" y="11" width="20" height="20" rx="4" fill="#0077B5" />
    <text x="20" y="25" font-family="Arial" font-weight="bold" font-size="13" fill="white" text-anchor="middle">in</text>
    <text x="46" y="26" class="link-text">LINKEDIN</text>
    <text x="46" y="38" font-family="'JetBrains Mono', monospace" font-size="7" fill="#8b949e">/in/bezaleel-paul</text>
  </g>

  <g transform="translate(572, 70)">
    <rect x="0" y="0" width="180" height="42" class="link-bg" />
    <circle cx="24" cy="21" r="10" fill="#39ff14" opacity="0.8" />
    <text x="46" y="26" class="link-text">PORTFOLIO</text>
    <text x="46" y="38" font-family="'JetBrains Mono', monospace" font-size="7" fill="#8b949e">bezaleelpaul.github.io</text>
  </g>

  <g transform="translate(376, 126)">
    <rect x="0" y="0" width="180" height="42" class="link-bg" />
    <rect x="14" y="11" width="20" height="20" rx="4" fill="#20BEFF" />
    <text x="20" y="25" font-family="Arial" font-weight="bold" font-size="14" fill="white" text-anchor="middle">K</text>
    <text x="46" y="26" class="link-text">KAGGLE</text>
    <text x="46" y="38" font-family="'JetBrains Mono', monospace" font-size="7" fill="#8b949e">/bezaleelpaul</text>
  </g>

  <g transform="translate(572, 126)">
    <rect x="0" y="0" width="180" height="42" class="link-bg" />
    <circle cx="24" cy="21" r="10" fill="#FFA116" />
    <text x="20" y="25" font-family="Arial" font-weight="bold" font-size="11" fill="white" text-anchor="middle">L</text>
    <text x="46" y="26" class="link-text">LEETCODE</text>
    <text x="46" y="38" font-family="'JetBrains Mono', monospace" font-size="7" fill="#8b949e">/LavaElixir</text>
  </g>

  <g transform="translate(376, 182)">
    <rect x="0" y="0" width="180" height="42" class="link-bg" />
    <rect x="14" y="11" width="20" height="20" rx="4" fill="#333" />
    <text x="20" y="25" font-family="Arial" font-weight="bold" font-size="13" fill="white" text-anchor="middle">G</text>
    <text x="46" y="26" class="link-text">GITHUB</text>
    <text x="46" y="38" font-family="'JetBrains Mono', monospace" font-size="7" fill="#8b949e">/BezaleelPaul</text>
  </g>

  <g transform="translate(572, 182)">
    <rect x="0" y="0" width="180" height="42" class="link-bg" />
    <rect x="14" y="11" width="20" height="20" rx="4" fill="#1F8ACB" />
    <text x="20" y="25" font-family="Arial" font-weight="bold" font-size="13" fill="white" text-anchor="middle">C</text>
    <text x="46" y="26" class="link-text">CODEFORCES</text>
    <text x="46" y="38" font-family="'JetBrains Mono', monospace" font-size="7" fill="#8b949e">/BezaleelPaulN</text>
  </g>

  <polygon points="16,16 376,16 376,16 16,16" class="hologram-beam">
    <animate attributeName="points" values="16,16 376,16 376,16 16,16; 16,16 376,16 376,244 16,244; 16,244 376,244 376,244 16,244; 16,16 376,16 376,16 16,16" dur="6s" repeatCount="indefinite" />
  </polygon>

  <line x1="16" y1="16" x2="376" y2="16" class="scan-line">
    <animate attributeName="y1" values="16;244;16" dur="6s" repeatCount="indefinite" />
    <animate attributeName="y2" values="16;244;16" dur="6s" repeatCount="indefinite" />
  </line>
</svg>